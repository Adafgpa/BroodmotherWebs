name: Java CI with Maven

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # This takes your uploaded repository file and injects it safely into the runner
    - name: Locally Register Mythic Jar
      run: |
        mvn install:install-file -Dfile=Mythic-API-5.7.2.jar -DgroupId=io.lumine -DartifactId=MythicMobs -Dversion=5.7.2 -Dpackaging=jar

    - name: Build with Maven
      run: mvn clean package
      
    - name: Upload Jar
      uses: actions/upload-artifact@v4
      with:
        name: BroodmotherWebs-Plugin
        path: target/*.jar
