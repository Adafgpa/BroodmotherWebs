name: Java CI with Maven

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Downloads the full implementation JAR from a mirror to satisfy package checks
    - name: Pre-load Full MythicMobs Jar
      run: |
        mkdir -p ~/.m2/repository/io/lumine/MythicMobs/5.7.2/
        curl -L -o ~/.m2/repository/io/lumine/MythicMobs/5.7.2/MythicMobs-5.7.2.jar "https://nexus.hc.to/repository/pub-mirror/io/lumine/MythicMobs/5.7.2/MythicMobs-5.7.2.jar"

    - name: Build with Maven
      run: mvn clean package
      
    - name: Upload Jar
      uses: actions/upload-artifact@v4
      with:
        name: BroodmotherWebs-Plugin
        path: target/*.jar
