name: Java CI with Maven

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Downloads a direct official copy of MythicMobs to compile against
    - name: Download MythicMobs Core Dependency
      run: |
        mkdir -p libs
        curl -L -o libs/MythicMobs.jar "https://mvn.lumine.io/repository/maven-public/io/lumine/MythicMobs/5.7.2/MythicMobs-5.7.2.jar" || curl -L -o libs/MythicMobs.jar "https://nexus.lumine.io/repository/maven-public/io/lumine/MythicMobs/5.7.0/MythicMobs-5.7.0.jar"

    - name: Install MythicMobs Local Dependency
      run: |
        mvn install:install-file -Dfile=libs/MythicMobs.jar -DgroupId=io.lumine -DartifactId=MythicMobs -Dversion=5.7.2 -Dpackaging=jar

    - name: Build with Maven
      run: mvn clean package
      
    - name: Upload Jar
      uses: actions/upload-artifact@v4
      with:
        name: BroodmotherWebs-Plugin
        path: target/*.jar
