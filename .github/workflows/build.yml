name: Java CI with Maven

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Downloads the full implementation JAR from a completely clean public build archive
    - name: Download Pristine Mythic Core
      run: |
        curl -L -o MythicMobs-Full.jar "https://repo.minebench.de/repository/minecraft/io/lumine/MythicMobs/5.7.2/MythicMobs-5.7.2.jar"

    # Registers it locally so Maven bypasses online lookups
    - name: Locally Register Mythic Jar
      run: |
        mvn install:install-file -Dfile=MythicMobs-Full.jar -DgroupId=io.lumine -DartifactId=MythicMobs -Dversion=5.7.2 -Dpackaging=jar

    - name: Build with Maven
      run: mvn clean package
      
    - name: Upload Jar
      uses: actions/upload-artifact@v4
      with:
        name: BroodmotherWebs-Plugin
        path: target/*.jar
